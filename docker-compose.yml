        condition: service_healthy

  # 7. Exam Service (Port 5004)
  exam-service:
    build:
      context: ./exam-service
      dockerfile: Dockerfile
    container_name: omniproctor_exams
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/ai-exam-platform
      - DATA_DIR=/app/database/data
      - JWT_SECRET=super_secret_jwt_key_4821
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=aiexamplatform123@gmail.com

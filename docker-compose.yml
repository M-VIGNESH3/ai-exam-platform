  # 2. MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: omniproctor_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Redis Caching Service
  redis-service:
    image: redis:alpine
    container_name: omniproctor_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 4. Auth Service (Port 5001)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: omniproctor_auth
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/ai-exam-platform
      - DATA_DIR=/app/database/data
      - JWT_SECRET=super_secret_jwt_key_4821
      - REFRESH_SECRET=super_secret_refresh_key_4821
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=aiexamplatform123@gmail.com
      - SMTP_PASSWORD=zmso iaml jdkh wpxn
      - SMTP_FROM=aiexamplatform123@gmail.com
    volumes:
      - ./database/data:/app/database/data
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  # 5. College Service (Port 5002)
  college-service:
    build:
      context: ./college-service
      dockerfile: Dockerfile
    container_name: omniproctor_colleges
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/ai-exam-platform
      - DATA_DIR=/app/database/data
      - JWT_SECRET=super_secret_jwt_key_4821
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=aiexamplatform123@gmail.com
      - SMTP_PASSWORD=zmso iaml jdkh wpxn
      - SMTP_FROM=aiexamplatform123@gmail.com
    volumes:
      - ./database/data:/app/database/data
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  # 6. Student Service (Port 5003)
  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: omniproctor_students
    ports:

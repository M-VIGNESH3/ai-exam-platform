  # 10. Dedicated WebSocket Service (Port 6001)
  websocket-service:
    build:
      context: ./websocket-service
      dockerfile: Dockerfile
    container_name: omniproctor_websocket
    ports:
      - "6001:6001"
    environment:
      - PORT=6001
    restart: always

  # 11. AI Inference Sim Proxy Service (Port 7000)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: omniproctor_ai_sim
    ports:
      - "7000:7000"
    environment:
      - PORT=7000
    restart: always

  # 12. React Frontend Web Application (Port 80)
  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: omniproctor_frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - auth-service
      - college-service
      - student-service
      - exam-service
      - proctoring-service
      - notification-service
      - websocket-service

volumes:
  pg_data:
  mongo_data:

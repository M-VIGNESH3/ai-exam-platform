      - DATA_DIR=/app/database/data
      - JWT_SECRET=super_secret_jwt_key_4821
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=aiexamplatform123@gmail.com
      - SMTP_PASSWORD=zmso iaml jdkh wpxn
      - SMTP_FROM=aiexamplatform123@gmail.com

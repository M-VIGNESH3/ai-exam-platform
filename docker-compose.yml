  # 8. Proctoring Service (Port 5005)
  proctoring-service:
    build:
      context: ./proctoring-service
      dockerfile: Dockerfile
    container_name: omniproctor_proctoring
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGO_URI=mongodb://mongodb:27017/ai-exam-platform
      - DATA_DIR=/app/database/data
      - UPLOADS_DIR=/app/uploads/evidence
      - JWT_SECRET=super_secret_jwt_key_4821
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=aiexamplatform123@gmail.com
      - SMTP_PASSWORD=zmso iaml jdkh wpxn
      - SMTP_FROM=aiexamplatform123@gmail.com
    volumes:
      - ./database/data:/app/database/data
      - ./uploads/evidence:/app/uploads/evidence
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  # 9. Notification & Analytics Service (Port 5006)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: omniproctor_notifications
    ports:
      - "5006:5006"
    environment:
